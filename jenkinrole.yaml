AWSTemplateFormatVersion: '2010-09-09'
Description: 'IAM Role and Policy for Jenkins Deployment - JenkinRole with JenkinDeploymentPolicy'

Resources:
  JenkinRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: JenkinRole
      Description: 'Allows EC2 instances to call AWS services on your behalf'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      MaxSessionDuration: 3600
      Policies:
        - PolicyName: JenkinDeploymentPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStackResources
                  - cloudformation:GetTemplate
                  - cloudformation:ListStacks
                  - cloudformation:ValidateTemplate
                Resource: "*"
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: "arn:aws:iam::*:role/CloudFormation-*"
              - Effect: Allow
                Action:
                  - ec2:*
                  - s3:*
                  - lambda:*
                  - apigateway:*
                  - rds:*
                  - dynamodb:*
                Resource: "*"
      Tags:
        - Key: Name
          Value: JenkinRole
        - Key: Purpose
          Value: Jenkins-CI-CD-Deployment

  # Instance Profile for EC2 instances to use this role
  JenkinInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: JenkinInstanceProfile
      Roles:
        - !Ref JenkinRole

Outputs:
  JenkinRoleArn:
    Description: 'ARN of the Jenkins IAM Role'
    Value: !GetAtt JenkinRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-JenkinRole-Arn'
  
  JenkinRoleName:
    Description: 'Name of the Jenkins IAM Role'
    Value: !Ref JenkinRole
    Export:
      Name: !Sub '${AWS::StackName}-JenkinRole-Name'
  
  JenkinInstanceProfileArn:
    Description: 'ARN of the Jenkins Instance Profile'
    Value: !GetAtt JenkinInstanceProfile.Arn
    Export:
      Name: !Sub '${AWS::StackName}-JenkinInstanceProfile-Arn'
  
  JenkinInstanceProfileName:
    Description: 'Name of the Jenkins Instance Profile'
    Value: !Ref JenkinInstanceProfile
    Export:
      Name: !Sub '${AWS::StackName}-JenkinInstanceProfile-Name'
